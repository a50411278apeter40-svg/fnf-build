name: FNF Mod Build

on:
  workflow_dispatch:
    inputs:
      mod_id:
        description: 'Mod UUID'
        required: true
      zip_url:
        description: 'Source ZIP download URL'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Setup Haxe 4.3.6
        uses: krdlab/setup-haxe@v1
        with:
          haxe-version: '4.3.6'

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y neko unzip libgl1 libglu1-mesa

      - name: Download & extract source ZIP
        run: |
          mkdir -p $GITHUB_WORKSPACE/mod_src
          curl -fL "${{ github.event.inputs.zip_url }}" -o $GITHUB_WORKSPACE/source.zip
          unzip -o $GITHUB_WORKSPACE/source.zip -d $GITHUB_WORKSPACE/src_raw

          COUNT=$(ls $GITHUB_WORKSPACE/src_raw | wc -l)
          INNER=$(ls $GITHUB_WORKSPACE/src_raw | head -1)
          if [ "$COUNT" = "1" ] && [ -d "$GITHUB_WORKSPACE/src_raw/$INNER" ]; then
            cp -r "$GITHUB_WORKSPACE/src_raw/$INNER/." $GITHUB_WORKSPACE/mod_src/
          else
            cp -r $GITHUB_WORKSPACE/src_raw/. $GITHUB_WORKSPACE/mod_src/
          fi
          echo "=== ZIP 내부 ===" && ls $GITHUB_WORKSPACE/mod_src/ | head -20

      - name: Detect ZIP type
        id: ziptype
        run: |
          SRC=$GITHUB_WORKSPACE/mod_src
          HAS_PROJECT=$(find $SRC -maxdepth 3 \( -name "Project.xml" -o -name "project.xml" -o -name "application.xml" \) | head -1 || true)
          HAS_HXML=$(find $SRC -maxdepth 3 -name "*.hxml" | head -1 || true)

          if [ -n "$HAS_PROJECT" ] || [ -n "$HAS_HXML" ]; then
            echo "mode=full_project" >> $GITHUB_OUTPUT
            echo "✅ 전체 프로젝트 ZIP"
          else
            echo "mode=mod_only" >> $GITHUB_OUTPUT
            echo "✅ 모드 에셋 전용 ZIP → base 병합"
          fi

      - name: Download Psych Engine base (mod-only)
        if: steps.ziptype.outputs.mode == 'mod_only'
        run: |
          mkdir -p $GITHUB_WORKSPACE/psych_src $GITHUB_WORKSPACE/build_project
          HTTP=$(curl -sL -w "%{http_code}" \
            "https://github.com/ShadowMario/FNF-PsychEngine/archive/refs/heads/main.zip" \
            -o $GITHUB_WORKSPACE/psych_base.zip)
          SZ=$(wc -c < $GITHUB_WORKSPACE/psych_base.zip)
          if [ "$HTTP" = "200" ] && [ "$SZ" -gt 100000 ]; then
            unzip -q $GITHUB_WORKSPACE/psych_base.zip -d $GITHUB_WORKSPACE/psych_src
            BASE_DIR=$(ls $GITHUB_WORKSPACE/psych_src | head -1)
            cp -r "$GITHUB_WORKSPACE/psych_src/$BASE_DIR/." $GITHUB_WORKSPACE/build_project/
            echo "✅ Psych Engine base 준비"
          else
            echo "⚠ Psych Engine 실패 → Vanilla FNF"
            curl -fL "https://github.com/FunkinCrew/Funkin/archive/refs/heads/main.zip" \
              -o $GITHUB_WORKSPACE/vanilla_base.zip || true
            unzip -q $GITHUB_WORKSPACE/vanilla_base.zip -d $GITHUB_WORKSPACE/vanilla_src || true
            BASE_DIR=$(ls $GITHUB_WORKSPACE/vanilla_src | head -1)
            cp -r "$GITHUB_WORKSPACE/vanilla_src/$BASE_DIR/." $GITHUB_WORKSPACE/build_project/ || true
          fi

      - name: Merge mod assets into base (mod-only)
        if: steps.ziptype.outputs.mode == 'mod_only'
        run: |
          SRC=$GITHUB_WORKSPACE/mod_src
          DST=$GITHUB_WORKSPACE/build_project
          for MOD_ASSETS in $(find $SRC -maxdepth 2 -type d -name "assets" | head -3); do
            mkdir -p $DST/assets
            cp -r "$MOD_ASSETS/." $DST/assets/ 2>/dev/null || true
          done
          for SUBDIR in songs images music data videos characters stages; do
            MOD_SUB=$(find $SRC -maxdepth 3 -type d -name "$SUBDIR" | head -1 || true)
            if [ -n "$MOD_SUB" ]; then
              mkdir -p "$DST/assets/$SUBDIR"
              cp -r "$MOD_SUB/." "$DST/assets/$SUBDIR/" 2>/dev/null || true
            fi
          done
          find $SRC -maxdepth 3 -name "*.hx" | head -30 | while read HX_FILE; do
            REL=$(realpath --relative-to=$SRC "$HX_FILE" 2>/dev/null || basename "$HX_FILE")
            TARGET_DIR="$DST/$(dirname $REL)"
            mkdir -p "$TARGET_DIR"
            cp "$HX_FILE" "$TARGET_DIR/" 2>/dev/null || true
          done
          cp -r $DST/. $GITHUB_WORKSPACE/mod_src/
          echo "=== 병합 후 ===" && ls $GITHUB_WORKSPACE/mod_src | head -15

      - name: Install ALL haxelibs from Project.xml
        run: |
          haxelib setup ~/haxelib

          SRC=$GITHUB_WORKSPACE/mod_src
          PX=$(find $SRC -maxdepth 4 \( -name "Project.xml" -o -name "project.xml" -o -name "application.xml" \) | head -1 || true)

          # ── 기본 필수 라이브러리 먼저 설치 ──
          for LIB in lime openfl flixel flixel-addons hxcpp tjson hscript hxcodec polymod; do
            echo "==> [기본] $LIB"
            haxelib install "$LIB" --quiet 2>&1 | tail -2 || true
          done

          # ── Project.xml에서 모든 <haxelib> 항목 자동 파싱 & 설치 ──
          if [ -n "$PX" ]; then
            echo "=== Project.xml haxelib 파싱 ==="
            # name 속성 추출
            grep -oP '(?<=<haxelib name=")[^"]+' "$PX" 2>/dev/null | sort -u | while read LIB; do
              # version 속성 추출 (같은 줄)
              VER=$(grep "name=\"$LIB\"" "$PX" | grep -oP '(?<=version=")[^"]+' | head -1 || true)
              if [ -n "$VER" ]; then
                echo "==> [Project.xml] $LIB@$VER"
                haxelib install "$LIB" "$VER" --quiet 2>&1 | tail -2 || true
                haxelib set "$LIB" "$VER" 2>/dev/null || true
              else
                echo "==> [Project.xml] $LIB (latest)"
                haxelib install "$LIB" --quiet 2>&1 | tail -2 || true
              fi
            done

            # ── .hxml 내 -lib 항목도 파싱 ──
            find $SRC -maxdepth 4 -name "*.hxml" | while read HXML; do
              grep -oP '(?<=-lib )\S+' "$HXML" 2>/dev/null | while read LIB; do
                echo "==> [hxml] $LIB"
                haxelib install "$LIB" --quiet 2>&1 | tail -2 || true
              done
            done
          fi

          # ── lime setup (C++ 바인딩 활성화) ──
          echo "==> lime setup"
          haxelib run lime setup 2>/dev/null || true

          echo "=== 설치된 라이브러리 ===" && haxelib list

      - name: Build
        run: |
          SRC=$GITHUB_WORKSPACE/mod_src
          PX=$(find $SRC -maxdepth 4 \( -name "Project.xml" -o -name "project.xml" -o -name "application.xml" \) | head -1 || true)
          HX=$(find $SRC -maxdepth 4 -name "*.hxml" | head -1 || true)
          mkdir -p $GITHUB_WORKSPACE/out

          if [ -n "$PX" ]; then
            echo "==> lime build html5: $PX"
            CWD=$(dirname "$PX")
            for d in export export/html5 export/html5/bin \
                     export/release export/release/html5 export/release/html5/bin \
                     export/final export/final/html5 export/final/html5/bin; do
              mkdir -p "$CWD/$d"
            done
            cd "$CWD" && haxelib run lime build html5 -final
          elif [ -n "$HX" ]; then
            echo "==> haxe: $HX"
            cd "$(dirname "$HX")" && haxe "$(basename "$HX")"
          else
            echo "❌ 빌드 진입점 없음"
            find $SRC -type f | head -30
            exit 1
          fi

      - name: Collect output
        run: |
          SRC=$GITHUB_WORKSPACE/mod_src
          IDX=$(find $SRC -name "index.html" | head -1 || true)
          if [ -n "$IDX" ]; then
            cp -r "$(dirname "$IDX")/." $GITHUB_WORKSPACE/out/
            echo "✅ 수집: $(dirname $IDX)" && ls $GITHUB_WORKSPACE/out/ | head -10
          else
            echo "❌ index.html 없음" && find $SRC -type f | head -20 && exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: fnf-build-${{ github.event.inputs.mod_id }}
          path: ${{ github.workspace }}/out/
          retention-days: 1
